{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} | Ground</title>
    <meta name="description" content="A source-anchored encyclopedia of weighted facts. Every claim traces back to verbatim quotes from cited sources.">
    <meta property="og:title" content="{{template "title" .}} | Ground">
    <meta property="og:description" content="Citations are mechanically checked against cached source bodies. Source credibilities are exposed as free parameters.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{template "title" .}} | Ground">
    <meta name="twitter:description" content="A source-anchored encyclopedia of weighted facts.">
    <meta name="theme-color" content="#39d353">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">GROUND</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/topics">Topics</a></li>
                <li><a href="/sources">Sources</a></li>
                <li><a href="/agents">Agents</a></li>
                <li><a href="/lenses">Lenses</a></li>
                <li><a href="/graph">Graph</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {{template "content" .}}
    </main>

    <footer>
        <div class="footer-inner">
            <span>Ground &mdash; a source-anchored encyclopedia of weighted facts</span>
            <span><a href="/about">How it works</a></span>
        </div>
    </footer>
</body>
</html>
