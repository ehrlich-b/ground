{{define "title"}}Graph{{end}}
{{define "content"}}
<h1>Knowledge Graph</h1>
<p>D3 force-directed visualization of claims, sources, and dependencies.</p>
<div id="graph-container" style="width: 100%; height: 700px; border: 1px solid var(--border, #444);"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
fetch('/api/graph').then(r => r.json()).then(({data}) => {
    const {nodes, links} = data;
    const width = document.getElementById('graph-container').clientWidth;
    const height = 700;
    const svg = d3.select('#graph-container').append('svg').attr('width', width).attr('height', height);
    const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width/2, height/2));
    const link = svg.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', d => {
            if (d.type === 'citation') return d.polarity === 'contradicts' ? '#e57373' : d.polarity === 'qualifies' ? '#fbc02d' : '#81c784';
            if (d.type === 'dependency') return '#90caf9';
            return '#ccc';
        })
        .attr('stroke-width', 1.5);
    const node = svg.append('g').selectAll('circle').data(nodes).join('circle')
        .attr('r', d => d.type === 'claim' ? 8 : 5)
        .attr('fill', d => d.type === 'claim' ? '#39d353' : d.type === 'source' ? '#ffa000' : '#888')
        .call(d3.drag()
            .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
            .on('end', (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
    node.append('title').text(d => d.label);
    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('cx', d => d.x).attr('cy', d => d.y);
    });
});
</script>
{{end}}
