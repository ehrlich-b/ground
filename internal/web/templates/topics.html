{{define "title"}}Topics{{end}}
{{define "content"}}
<h1>Topics</h1>
<ul class="topic-list">
{{range .Topics}}
    <li>
        <a href="/topic/{{.Slug}}">{{.Title}}</a>
        {{if .Description}}<p>{{deref .Description}}</p>{{end}}
    </li>
{{else}}
    <li><em>No topics yet.</em></li>
{{end}}
</ul>
{{end}}
