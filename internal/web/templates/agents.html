{{define "title"}}Agents{{end}}
{{define "content"}}
<h1>Agents</h1>
<table class="data-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Reliability</th>
            <th>Productivity</th>
        </tr>
    </thead>
    <tbody>
    {{range .Agents}}
        <tr>
            <td><a href="/agent/{{.ID}}">{{.Name}}</a></td>
            <td>{{.Role}}</td>
            <td>{{pctf .Reliability}}%</td>
            <td>{{printf "%.2f" .Productivity}}</td>
        </tr>
    {{else}}
        <tr><td colspan="4"><em>No agents yet.</em></td></tr>
    {{end}}
    </tbody>
</table>
{{end}}
